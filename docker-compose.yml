  #     INCOGNITO_PASSWORD: ${INCOGNITO_PASSWORD}
  #     INCOGNITO_NOTIFY_URL: ${INCOGNITO_NOTIFY_URL:-}
  #   entrypoint: ["python", "cli.py", "check-replies"]
  #   depends_on:
  #     incognito:
  #       condition: service_healthy
  #   # Run every 15 minutes via restart + sleep
  #   restart: always
  #   command: ["sh", "-c", "python cli.py check-replies; sleep 900"]

