services:
  incognito:
    build:
      context: .
      dockerfile: deploy/Containerfile
    # Or use the pre-built image:
    # image: ghcr.io/salicath/incognito:latest
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - incognito-data:/home/incognito/.incognito
    environment:
      INCOGNITO_LOG_LEVEL: info
      # Required for automated follow-ups and IMAP polling:
      # INCOGNITO_PASSWORD: ${INCOGNITO_PASSWORD}
      # Notification URL (optional, supports Ntfy and generic webhooks):
      # INCOGNITO_NOTIFY_URL: https://ntfy.sh/my-incognito-alerts
      # Reverse proxy auth (Authentik/Authelia/Traefik ForwardAuth):
      # INCOGNITO_TRUSTED_PROXY_HEADER: Remote-User
      # INCOGNITO_SECURE_COOKIES: "true"
    restart: unless-stopped
    # Uncomment for Traefik reverse proxy:
    # labels:
    #   traefik.enable: "true"
    #   traefik.http.routers.incognito.rule: "Host(`incognito.example.com`)"
    #   traefik.http.routers.incognito.tls.certresolver: "letsencrypt"
    #   traefik.http.services.incognito.loadbalancer.server.port: "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; r=urllib.request.urlopen('http://localhost:8080/api/health'); assert json.load(r)['status']=='healthy'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: uncomment the services below for automated background tasks.
  # Set INCOGNITO_PASSWORD in your .env file first.

  # check-replies:
