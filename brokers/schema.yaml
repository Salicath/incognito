type: object
required:
  - name
  - domain
  - category
  - dpo_email
  - removal_method
  - country
  - gdpr_applies
  - verification_required
  - language
  - last_verified
properties:
  name:
    type: string
  domain:
    type: string
  category:
    type: string
    enum: [data_broker, people_search, marketing, credit_agency, other]
  dpo_email:
    type: string
    format: email
  removal_method:
    type: string
    enum: [email, web_form, api]
  removal_url:
    type: [string, "null"]
  api_endpoint:
    type: [string, "null"]
  country:
    type: string
  gdpr_applies:
    type: boolean
  verification_required:
    type: boolean
  language:
    type: string
  last_verified:
    type: string
    format: date
  notes:
    type: [string, "null"]
