name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,scanner]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  broker-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic

      - name: Validate broker YAML files
        run: |
          python -c "
          from pathlib import Path
          import yaml
          import sys

          required_fields = ['name', 'domain', 'category', 'dpo_email', 'removal_method', 'country', 'gdpr_applies', 'verification_required', 'language', 'last_verified']
          valid_categories = ['data_broker', 'people_search', 'marketing', 'credit_agency', 'other']
          valid_methods = ['email', 'web_form', 'api']
          errors = []
          count = 0

          for path in sorted(Path('brokers').glob('*.yaml')):
              if path.stem == 'schema':
                  continue
              count += 1
              try:
                  data = yaml.safe_load(path.read_text())
                  for field in required_fields:
                      if field not in data:
                          errors.append(f'{path.name}: missing field \"{field}\"')
                  if data.get('category') not in valid_categories:
                      errors.append(f'{path.name}: invalid category \"{data.get(\"category\")}\"')
                  if data.get('removal_method') not in valid_methods:
                      errors.append(f'{path.name}: invalid removal_method \"{data.get(\"removal_method\")}\"')
              except Exception as e:
                  errors.append(f'{path.name}: {e}')

          print(f'Validated {count} broker files')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All broker files valid')
          "

  container:
    runs-on: ubuntu-latest
    needs: [test, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false

      - name: Build and smoke test (amd64)
        run: |
          docker build -f deploy/Containerfile -t incognito:test .
          docker run --rm -d --name incognito-test -p 8080:8080 incognito:test
          sleep 3
          curl -sf http://localhost:8080/api/health
          docker stop incognito-test

  publish:
    runs-on: ubuntu-latest
    needs: [test, frontend, container, broker-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
